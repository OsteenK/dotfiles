# Arena — tmux configuration
# This file is loaded by arena.sh when creating the session

# Prefix: Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -g escape-time 0
set -g display-time 2000
set -g status-interval 5
set -g focus-events on

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60

# Pane navigation: Alt+Arrows (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Prefix+0: Jump to main Claude pane (pane 1)
bind 0 select-pane -t 1

# Prefix+f: Fullscreen toggle current pane
bind f resize-pane -Z

# Prefix+C: Clear all agent logs
bind C run-shell "truncate -s 0 ~/.claude/arena/agents/*.log && echo '' > ~/.claude/arena/agents/activity.log && tmux display-message 'Agent logs cleared'"

# Prefix+T: Cycle themes
bind T run-shell "~/.claude/arena/scripts/theme-switcher.sh cycle"

# Prefix+F1-F4: Direct theme select
bind -T prefix F1 run-shell "~/.claude/arena/scripts/theme-switcher.sh matrix"
bind -T prefix F2 run-shell "~/.claude/arena/scripts/theme-switcher.sh damu"
bind -T prefix F3 run-shell "~/.claude/arena/scripts/theme-switcher.sh cyberpunk"
bind -T prefix F4 run-shell "~/.claude/arena/scripts/theme-switcher.sh mixed"

# Don't rename windows automatically
set -g allow-rename off
setw -g automatic-rename off
