# ─── Dotfiles base tmux config ───

# Prefix: Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc,*256col*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -g escape-time 0
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
set -g renumber-windows on

# Vi copy mode with xclip
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# Pane navigation: Alt+Arrows (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Prefix+f: zoom toggle
bind f resize-pane -Z

# Ctrl+` : toggle bottom terminal (VSCode-style)
bind -n C-\` if-shell "tmux list-panes | wc -l | grep -q '^1$'" \
    "split-window -v -l 30% -c '#{pane_current_path}'" \
    "if-shell \"tmux display-message -p '#{pane_at_bottom}' | grep -q 1\" kill-pane \"select-pane -t {bottom}\""

# Prefix+w: workspace picker
bind w run-shell "tmux display-popup -E '~/.local/bin/ws'"

# Prefix+r: reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# New windows/panes inherit current path
bind c new-window -c "#{pane_current_path}"

# Don't rename windows automatically
set -g allow-rename off
setw -g automatic-rename off

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left " #[fg=#7aa2f7,bold]⚡ #S #[default]│ "
set -g status-right " #[fg=#565f89]%H:%M #[fg=#565f89]│ #[fg=#7aa2f7]%d-%b "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W "
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
