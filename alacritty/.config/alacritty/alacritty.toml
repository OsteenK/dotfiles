[window]
opacity = 0.85          # 0.0 = fully transparent, 1.0 = fully opaque
blur = true             # blur the background (works on supported compositors)
padding = { x = 10, y = 10 }
decorations = "full"

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[scrolling]
history = 10000
